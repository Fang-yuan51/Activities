name: Build Chess Presence
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: npx pmd build "Chess.com"
      - uses: actions/upload-artifact@v4
        with:
          name: chess-dist
          path: websites/C/Chess.com/dist
          
